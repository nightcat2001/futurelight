name: Verify

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  DATABASE_URL: postgres://futurelight:futurelight@localhost:37432/futurelight
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Core product checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: futurelight
          POSTGRES_PASSWORD: futurelight
          POSTGRES_USER: futurelight
        ports:
          - 37432:5432
        options: >-
          --health-cmd "pg_isready -U futurelight -d futurelight"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Set up Rust components
        run: rustup component add rustfmt clippy

      - name: Backend migrations
        working-directory: backend
        run: cargo run -- migrate

      - name: Rust fmt
        working-directory: backend
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: backend
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust tests
        working-directory: backend
        run: cargo test

      - name: Backend content publish check
        working-directory: backend
        run: cargo run -- check-content

      - name: Content and asset checker
        run: node tools/check-content-assets.mjs

      - name: Secret scan
        shell: pwsh
        run: ./tools/check-secrets.ps1
