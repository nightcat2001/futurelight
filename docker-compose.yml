services:
  postgres:
    image: postgres:17-alpine
    container_name: futurelight-postgres
    environment:
      POSTGRES_USER: futurelight
      POSTGRES_PASSWORD: futurelight
      POSTGRES_DB: futurelight
    ports:
      - "5433:5432"
    volumes:
      - futurelight-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U futurelight -d futurelight"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  futurelight-postgres-data:
